<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cycle-NCE Train Log Visualizer</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --line: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --ok: #22c55e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      background: radial-gradient(1200px 700px at 10% -10%, #1e293b, var(--bg));
      color: var(--text);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      gap: 14px;
    }
    .card {
      background: color-mix(in srgb, var(--panel) 92%, #000);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }
    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    textarea {
      width: 100%;
      min-height: 210px;
      resize: vertical;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 10px;
      background: #0b1220;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.45;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    button {
      border: 1px solid #334155;
      background: #0b1220;
      color: var(--text);
      padding: 7px 11px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover { border-color: #475569; }
    .ok { color: var(--ok); font-size: 13px; }
    .metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
    }
    .metrics label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      color: #d1d5db;
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 12px;
    }
    .chart-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 8px 4px;
      background: #0b1220;
    }
    .chart-title {
      font-size: 12px;
      color: #cbd5e1;
      margin: 0 0 6px;
    }
    canvas {
      width: 100%;
      height: 200px;
      display: block;
      border-radius: 8px;
      background: linear-gradient(180deg, #0b1220, #0a1020);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 6px 4px;
      text-align: right;
    }
    th:first-child, td:first-child { text-align: left; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Training Log Visualizer</h1>
      <p class="hint">粘贴 `training_*.csv`、训练终端日志（`Epoch ... | loss=...`）或梯度日志（`[Epoch ... Step ...] --- Gradient Magnitude Radar ---`）后自动解析并可视化。</p>
    </div>

    <div class="card">
      <textarea id="logInput" placeholder="Paste logs here..."></textarea>
      <div class="row" style="margin-top:8px;">
        <button id="parseBtn">Parse + Plot</button>
        <button id="clearBtn">Clear</button>
        <span id="status" class="ok"></span>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div class="metrics" id="metricPicker"></div>
      </div>
    </div>

    <div class="card">
      <div id="charts" class="chart-grid"></div>
    </div>

    <div class="card">
      <div class="muted" style="margin-bottom:6px;">Last Epoch Snapshot</div>
      <table>
        <thead><tr><th>Metric</th><th>Value</th></tr></thead>
        <tbody id="snapshotBody"></tbody>
      </table>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between; margin-bottom:6px;">
        <div class="muted">Latest Gradient Radar</div>
        <div id="gradStatus" class="muted"></div>
      </div>
      <table>
        <thead><tr><th>Layer</th><th>Grad</th><th>Weight</th><th>Ratio(1e-3)</th></tr></thead>
        <tbody id="gradBody"></tbody>
      </table>
    </div>

    <div class="card">
      <div class="muted" style="margin-bottom:6px;">Gradient Trends</div>
      <div id="gradCharts" class="chart-grid"></div>
    </div>
  </div>

  <script>
    const METRICS = [
      "loss",
      "style_swd",
      "style_moment",
      "structure",
      "tv",
      "identity",
      "train_num_steps",
      "train_step_size",
      "train_style_strength",
      "lr",
      "data_time_sec",
      "compute_time_sec",
      "epoch_time_sec",
      "samples_seen",
      "samples_per_sec"
    ];
    const DEFAULT_ON = new Set(["loss", "style_swd", "style_moment", "structure", "identity", "lr", "samples_per_sec"]);
    const COLORS = [
      "#38bdf8", "#f59e0b", "#22c55e", "#ef4444", "#a78bfa", "#14b8a6",
      "#eab308", "#f97316", "#60a5fa", "#10b981", "#f472b6", "#84cc16"
    ];
    const GRAD_TRACK_LAYERS = [
      "style_emb.weight",
      "enc_in.weight",
      "hires_body.0.conv1.weight",
      "dec_out.weight",
      "dec_out.bias"
    ];
    const ALIAS = {
      style: "style_swd",
      style_swd: "style_swd",
      mom: "style_moment",
      moment: "style_moment",
      struct: "structure",
      structure: "structure",
      idt: "identity",
      identity: "identity",
      steps: "train_num_steps",
      h: "train_step_size",
      s: "train_style_strength",
      sps: "samples_per_sec",
      samples: "samples_seen",
      data: "data_time_sec",
      compute: "compute_time_sec",
      comp: "compute_time_sec",
      total: "epoch_time_sec"
    };

    const input = document.getElementById("logInput");
    const parseBtn = document.getElementById("parseBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");
    const chartsEl = document.getElementById("charts");
    const pickerEl = document.getElementById("metricPicker");
    const snapshotBody = document.getElementById("snapshotBody");
    const gradStatusEl = document.getElementById("gradStatus");
    const gradBody = document.getElementById("gradBody");
    const gradChartsEl = document.getElementById("gradCharts");

    let parsedRows = [];
    let parsedGrads = [];
    let selected = new Set([...DEFAULT_ON]);

    function setupPicker() {
      pickerEl.innerHTML = "";
      for (const m of METRICS) {
        const id = `m_${m}`;
        const wrap = document.createElement("label");
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.id = id;
        cb.checked = selected.has(m);
        cb.addEventListener("change", () => {
          if (cb.checked) selected.add(m); else selected.delete(m);
          renderAll();
        });
        const text = document.createElement("span");
        text.textContent = m;
        wrap.appendChild(cb);
        wrap.appendChild(text);
        pickerEl.appendChild(wrap);
      }
    }

    function toNumber(v) {
      if (v == null) return null;
      const n = Number(String(v).replace(/s$/i, ""));
      return Number.isFinite(n) ? n : null;
    }

    function normalizeWrappedLines(text) {
      return String(text || "")
        .replace(/=\s*\r?\n\s*([+-]?\d)/g, "=$1")
        .replace(/\|\s*\r?\n\s*/g, "| ");
    }

    function parseCsv(text) {
      const lines = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      if (lines.length < 2) return [];
      const head = lines[0].split(",").map(s => s.trim());
      if (!head.includes("epoch")) return [];
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = lines[i].split(",").map(s => s.trim());
        if (cols.length < head.length) continue;
        const obj = {};
        head.forEach((k, idx) => obj[k] = cols[idx]);
        const epoch = toNumber(obj.epoch);
        if (epoch == null) continue;
        const row = { epoch };
        for (const m of METRICS) {
          if (obj[m] != null) row[m] = toNumber(obj[m]);
        }
        rows.push(row);
      }
      return rows;
    }

    function parseConsole(text) {
      const lines = text.split(/\r?\n/);
      const rows = [];
      for (const line of lines) {
        const match = line.match(/Epoch\s+(\d+)\/(\d+)[^|]*\|\s*(.+)$/i);
        if (!match) continue;
        const epoch = Number(match[1]);
        const tail = match[3] || "";
        const row = { epoch };
        const kv = [...tail.matchAll(/([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([+-]?\d+(?:\.\d+)?(?:e[+-]?\d+)?s?)/g)];
        for (const [, rawKey, rawVal] of kv) {
          const key = ALIAS[rawKey] || rawKey;
          const val = toNumber(rawVal);
          if (val == null) continue;
          row[key] = val;
        }
        rows.push(row);
      }
      return rows;
    }

    function parseGradient(text) {
      const lines = text.split(/\r?\n/);
      const snapshots = [];
      let current = null;

      for (const line of lines) {
        const h = line.match(/\[Epoch\s+(\d+)\s+Step\s+(\d+)\]\s*---\s*Gradient Magnitude Radar/i);
        if (h) {
          if (current && current.entries.length) snapshots.push(current);
          current = { epoch: Number(h[1]), step: Number(h[2]), entries: [] };
          continue;
        }
        if (!current) continue;

        const payload = line.replace(/^.*?\bINFO\s*-\s*/, "").trim();
        const m = payload.match(/([^|]+?)\s*\|\s*([+-]?\d+(?:\.\d+)?(?:e[+-]?\d+)?)\s*\|\s*([+-]?\d+(?:\.\d+)?(?:e[+-]?\d+)?)\s*\|\s*([+-]?\d+(?:\.\d+)?(?:e[+-]?\d+)?)/i);
        if (!m) continue;
        const layer = m[1].trim();
        if (!layer || /^layer$/i.test(layer)) continue;
        const grad = Number(m[2]);
        const weight = Number(m[3]);
        const ratio = Number(m[4]);
        if (!Number.isFinite(grad) || !Number.isFinite(weight) || !Number.isFinite(ratio)) continue;
        current.entries.push({ layer, grad, weight, ratio });
      }
      if (current && current.entries.length) snapshots.push(current);
      return snapshots;
    }

    function parseText(text) {
      const normalized = normalizeWrappedLines(text);
      let rows = parseCsv(normalized);
      if (rows.length === 0) rows = parseConsole(normalized);
      const grads = parseGradient(normalized);
      if (rows.length === 0) rows = parseConsole(text);
      if (rows.length === 0 && grads.length === 0) return { rows: [], grads: [] };

      const byEpoch = new Map();
      for (const row of rows) {
        const prev = byEpoch.get(row.epoch) || { epoch: row.epoch };
        byEpoch.set(row.epoch, { ...prev, ...row });
      }
      return {
        rows: [...byEpoch.values()].sort((a, b) => a.epoch - b.epoch),
        grads,
      };
    }

    function drawLine(canvas, rows, metric, color) {
      const ctx = canvas.getContext("2d");
      const w = canvas.width = canvas.clientWidth * devicePixelRatio;
      const h = canvas.height = canvas.clientHeight * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);
      const cw = canvas.clientWidth;
      const ch = canvas.clientHeight;
      const pad = { l: 44, r: 8, t: 10, b: 24 };
      const xs = rows.map(r => r.epoch);
      const ys = rows.map(r => r[metric]).filter(v => Number.isFinite(v));
      if (!ys.length) {
        ctx.fillStyle = "#94a3b8";
        ctx.font = "12px sans-serif";
        ctx.fillText("No data", 12, 20);
        return;
      }
      const xMin = Math.min(...xs), xMax = Math.max(...xs);
      let yMin = Math.min(...ys), yMax = Math.max(...ys);
      if (yMin === yMax) { yMin -= 1; yMax += 1; }
      const toX = x => pad.l + (x - xMin) / Math.max(1e-9, (xMax - xMin)) * (cw - pad.l - pad.r);
      const toY = y => ch - pad.b - (y - yMin) / Math.max(1e-9, (yMax - yMin)) * (ch - pad.t - pad.b);

      ctx.strokeStyle = "#1f2937";
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const gy = pad.t + i * (ch - pad.t - pad.b) / 3;
        ctx.beginPath(); ctx.moveTo(pad.l, gy); ctx.lineTo(cw - pad.r, gy); ctx.stroke();
      }

      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      let started = false;
      for (const r of rows) {
        const y = r[metric];
        if (!Number.isFinite(y)) continue;
        const x = toX(r.epoch), py = toY(y);
        if (!started) { ctx.moveTo(x, py); started = true; } else { ctx.lineTo(x, py); }
      }
      ctx.stroke();

      ctx.fillStyle = "#cbd5e1";
      ctx.font = "11px sans-serif";
      ctx.fillText(String(xMin), pad.l, ch - 8);
      ctx.fillText(String(xMax), cw - pad.r - ctx.measureText(String(xMax)).width, ch - 8);
      ctx.fillText(yMax.toFixed(4), 6, pad.t + 4);
      ctx.fillText(yMin.toFixed(4), 6, ch - pad.b);
    }

    function renderSnapshot(rows) {
      snapshotBody.innerHTML = "";
      if (!rows.length) return;
      const last = rows[rows.length - 1];
      const keys = ["epoch", ...METRICS.filter(k => Number.isFinite(last[k]))];
      for (const k of keys) {
        const tr = document.createElement("tr");
        const tdK = document.createElement("td");
        const tdV = document.createElement("td");
        tdK.textContent = k;
        tdV.textContent = Number.isFinite(last[k]) ? Number(last[k]).toFixed(6) : String(last[k] ?? "");
        tr.appendChild(tdK);
        tr.appendChild(tdV);
        snapshotBody.appendChild(tr);
      }
    }

    function renderGradient(grads) {
      gradBody.innerHTML = "";
      if (!grads.length) {
        gradStatusEl.textContent = "No gradient radar parsed";
        return;
      }
      const last = grads[grads.length - 1];
      gradStatusEl.textContent = `Snapshots: ${grads.length}, latest: E${last.epoch} S${last.step}, layers: ${last.entries.length}`;

      const top = [...last.entries]
        .sort((a, b) => (b.ratio - a.ratio) || (b.grad - a.grad))
        .slice(0, 30);
      for (const e of top) {
        const tr = document.createElement("tr");
        const tdLayer = document.createElement("td");
        const tdGrad = document.createElement("td");
        const tdWeight = document.createElement("td");
        const tdRatio = document.createElement("td");
        tdLayer.textContent = e.layer;
        tdGrad.textContent = e.grad.toExponential(2);
        tdWeight.textContent = e.weight.toExponential(2);
        tdRatio.textContent = e.ratio.toFixed(4);
        tr.appendChild(tdLayer);
        tr.appendChild(tdGrad);
        tr.appendChild(tdWeight);
        tr.appendChild(tdRatio);
        gradBody.appendChild(tr);
      }
    }

    function drawPoints(canvas, points, color) {
      const ctx = canvas.getContext("2d");
      const w = canvas.width = canvas.clientWidth * devicePixelRatio;
      const h = canvas.height = canvas.clientHeight * devicePixelRatio;
      ctx.scale(devicePixelRatio, devicePixelRatio);
      const cw = canvas.clientWidth;
      const ch = canvas.clientHeight;
      const pad = { l: 44, r: 8, t: 10, b: 24 };

      const ys = points.map(p => p.y).filter(v => Number.isFinite(v));
      const xs = points.map(p => p.x).filter(v => Number.isFinite(v));
      if (!xs.length || !ys.length) {
        ctx.fillStyle = "#94a3b8";
        ctx.font = "12px sans-serif";
        ctx.fillText("No data", 12, 20);
        return;
      }

      const xMin = Math.min(...xs), xMax = Math.max(...xs);
      let yMin = Math.min(...ys), yMax = Math.max(...ys);
      if (yMin === yMax) { yMin -= 1; yMax += 1; }
      const toX = x => pad.l + (x - xMin) / Math.max(1e-9, (xMax - xMin)) * (cw - pad.l - pad.r);
      const toY = y => ch - pad.b - (y - yMin) / Math.max(1e-9, (yMax - yMin)) * (ch - pad.t - pad.b);

      ctx.strokeStyle = "#1f2937";
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const gy = pad.t + i * (ch - pad.t - pad.b) / 3;
        ctx.beginPath(); ctx.moveTo(pad.l, gy); ctx.lineTo(cw - pad.r, gy); ctx.stroke();
      }

      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.beginPath();
      let started = false;
      for (const p of points) {
        if (!Number.isFinite(p.y)) continue;
        const x = toX(p.x), py = toY(p.y);
        if (!started) { ctx.moveTo(x, py); started = true; } else { ctx.lineTo(x, py); }
      }
      ctx.stroke();

      ctx.fillStyle = "#cbd5e1";
      ctx.font = "11px sans-serif";
      ctx.fillText(String(xMin), pad.l, ch - 8);
      ctx.fillText(String(xMax), cw - pad.r - ctx.measureText(String(xMax)).width, ch - 8);
      ctx.fillText(yMax.toFixed(4), 6, pad.t + 4);
      ctx.fillText(yMin.toFixed(4), 6, ch - pad.b);
    }

    function buildGradientTrendSeries(grads) {
      const series = [];
      if (!grads.length) return series;

      const agg = {
        max_grad: [],
        mean_grad: [],
        max_ratio: [],
        mean_ratio: [],
      };
      const layerSeries = new Map();
      for (const layer of GRAD_TRACK_LAYERS) layerSeries.set(layer, []);

      grads.forEach((snap, idx) => {
        const x = idx + 1;
        const entries = snap.entries || [];
        if (!entries.length) return;
        const gradsOnly = entries.map(e => e.grad).filter(Number.isFinite);
        const ratiosOnly = entries.map(e => e.ratio).filter(Number.isFinite);
        if (gradsOnly.length) {
          agg.max_grad.push({ x, y: Math.max(...gradsOnly) });
          agg.mean_grad.push({ x, y: gradsOnly.reduce((a, b) => a + b, 0) / gradsOnly.length });
        }
        if (ratiosOnly.length) {
          agg.max_ratio.push({ x, y: Math.max(...ratiosOnly) });
          agg.mean_ratio.push({ x, y: ratiosOnly.reduce((a, b) => a + b, 0) / ratiosOnly.length });
        }

        const byLayer = new Map(entries.map(e => [e.layer, e]));
        for (const layer of GRAD_TRACK_LAYERS) {
          const item = byLayer.get(layer);
          if (item && Number.isFinite(item.ratio)) {
            layerSeries.get(layer).push({ x, y: item.ratio });
          }
        }
      });

      for (const [k, points] of Object.entries(agg)) {
        if (points.length) series.push({ name: k, points });
      }
      for (const [layer, points] of layerSeries.entries()) {
        if (points.length) series.push({ name: `ratio:${layer}`, points });
      }
      return series;
    }

    function renderGradientCharts(grads) {
      gradChartsEl.innerHTML = "";
      const series = buildGradientTrendSeries(grads);
      if (!series.length) return;

      series.forEach((s, i) => {
        const card = document.createElement("div");
        card.className = "chart-card";
        const title = document.createElement("p");
        title.className = "chart-title";
        title.textContent = `${s.name} (x = snapshot idx)`;
        const canvas = document.createElement("canvas");
        card.appendChild(title);
        card.appendChild(canvas);
        gradChartsEl.appendChild(card);
        drawPoints(canvas, s.points, COLORS[i % COLORS.length]);
      });
    }

    function renderCharts(rows) {
      chartsEl.innerHTML = "";
      const active = METRICS.filter(m => selected.has(m));
      if (!rows.length || !active.length) return;
      active.forEach((m, i) => {
        const card = document.createElement("div");
        card.className = "chart-card";
        const title = document.createElement("p");
        title.className = "chart-title";
        title.textContent = m;
        const canvas = document.createElement("canvas");
        card.appendChild(title);
        card.appendChild(canvas);
        chartsEl.appendChild(card);
        drawLine(canvas, rows, m, COLORS[i % COLORS.length]);
      });
    }

    function renderAll() {
      renderCharts(parsedRows);
      renderSnapshot(parsedRows);
      renderGradient(parsedGrads);
      renderGradientCharts(parsedGrads);
    }

    function runParse() {
      const text = input.value || "";
      const parsed = parseText(text);
      parsedRows = parsed.rows;
      parsedGrads = parsed.grads;
      renderAll();
      if (parsedRows.length && parsedGrads.length) {
        statusEl.textContent = `Parsed ${parsedRows.length} epoch rows + ${parsedGrads.length} gradient snapshots`;
      } else if (parsedRows.length) {
        statusEl.textContent = `Parsed ${parsedRows.length} epoch rows`;
      } else if (parsedGrads.length) {
        statusEl.textContent = `Parsed ${parsedGrads.length} gradient snapshots`;
      } else {
        statusEl.textContent = "No valid rows parsed";
      }
    }

    parseBtn.addEventListener("click", runParse);
    clearBtn.addEventListener("click", () => {
      input.value = "";
      parsedRows = [];
      parsedGrads = [];
      renderAll();
      statusEl.textContent = "";
    });
    input.addEventListener("paste", () => setTimeout(runParse, 20));

    setupPicker();
  </script>
</body>
</html>
