<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MA Probe Sweep Viewer</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #16202a;
      --muted: #5f6b76;
      --line: #d9dee5;
      --accent: #17324d;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1600px; margin: 0 auto; padding: 24px; }
    .header { margin-bottom: 18px; }
    .header h1 { margin: 0 0 6px 0; font-size: 24px; }
    .header p { margin: 0; color: var(--muted); }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin: 18px 0 20px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 26px; font-weight: 700; margin-top: 6px; }
    .plot { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 8px; margin-bottom: 16px; }
    .table-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; overflow: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); text-align: left; white-space: nowrap; }
    th { position: sticky; top: 0; background: #f9fafb; z-index: 1; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>MA Probe Sweep Viewer</h1>
      <p>Batch overview of stage-level MA heat and hottest layers.</p>
    </div>

    <div class="stats">
      <div class="card"><div class="stat-label">Runs</div><div class="stat-value" id="statRuns">0</div></div>
      <div class="card"><div class="stat-label">Checkpoints</div><div class="stat-value" id="statCkpts">0</div></div>
      <div class="card"><div class="stat-label">Peak MA</div><div class="stat-value" id="statPeak">0</div></div>
      <div class="card"><div class="stat-label">Most Common Top Stage</div><div class="stat-value" id="statStage">-</div></div>
    </div>

    <div class="plot"><div id="stageBar" style="height: 480px;"></div></div>
    <div class="plot"><div id="stageScatter" style="height: 480px;"></div></div>
    <div class="plot"><div id="layerHeatmap" style="height: 720px;"></div></div>

    <div class="table-wrap">
      <table id="summaryTable">
        <thead>
          <tr>
            <th>Run</th>
            <th>Checkpoint</th>
            <th>Top Layer</th>
            <th>Top Stage</th>
            <th>Peak MA</th>
            <th>Hires</th>
            <th>Body</th>
            <th>Skip</th>
            <th>Decoder</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    const pageData = {"records": [{"run_name": "photo -> Hayao", "source": "photo->Hayao", "checkpoint": "G:\\GitHub\\Latent_Style\\Cycle-NCE\\epoch_0060.pt", "source_style": "photo", "target_style": "Hayao", "top_layer_name": "hires_body.0", "top_layer_stage": "hires", "top_layer_max_ma_ratio": 18.002199172973633, "top_layer_mean_ma_ratio": 7.419791221618652, "num_layers": 25, "stem_max": 7.6579790115356445, "stem_mean": 7.012826919555664, "hires_max": 18.002199172973633, "hires_mean": 13.184598128000895, "body_max": 6.118303298950195, "body_mean": 5.799346129099528, "skip_max": 15.553544044494629, "skip_mean": 10.879210948944092, "decoder_max": 11.940325736999512, "decoder_mean": 8.47976598739624, "output_max": null, "output_mean": null, "other_max": null, "other_mean": null}, {"run_name": "photo -> monet", "source": "photo->monet", "checkpoint": "G:\\GitHub\\Latent_Style\\Cycle-NCE\\epoch_0060.pt", "source_style": "photo", "target_style": "monet", "top_layer_name": "hires_body.0", "top_layer_stage": "hires", "top_layer_max_ma_ratio": 15.741459846496582, "top_layer_mean_ma_ratio": 7.4094929695129395, "num_layers": 25, "stem_max": 6.734146595001221, "stem_mean": 6.248929738998413, "hires_max": 15.741459846496582, "hires_mean": 11.226898352305094, "body_max": 6.303826808929443, "body_mean": 5.976747512817383, "skip_max": 11.958059310913086, "skip_mean": 9.053747773170471, "decoder_max": 12.516890525817871, "decoder_mean": 8.509973907470703, "output_max": null, "output_mean": null, "other_max": null, "other_mean": null}, {"run_name": "photo -> vangogh", "source": "photo->vangogh", "checkpoint": "G:\\GitHub\\Latent_Style\\Cycle-NCE\\epoch_0060.pt", "source_style": "photo", "target_style": "vangogh", "top_layer_name": "hires_body.0", "top_layer_stage": "hires", "top_layer_max_ma_ratio": 27.185068130493164, "top_layer_mean_ma_ratio": 7.962722301483154, "num_layers": 25, "stem_max": 11.582205772399902, "stem_mean": 9.811851978302002, "hires_max": 27.185068130493164, "hir 6496582, 13.357638359069824, 11.107087135314941, 12.127155303955078, 9.445119857788086, 11.958059310913086, 9.740081787109375, 12.516890525817871, 6.949934959411621, 9.447635650634766, 11.589731216430664, 6.734146595001221, 9.78846549987793, 7.231368541717529, 9.255706787109375, 5.980931282043457, 8.668974876403809, 6.121611595153809, 5.7852020263671875, 5.7637128829956055, 5.841213703155518, 5.841213703155518, 6.303826808929443, 5.918476104736328], [27.185068130493164, 21.24031639099121, 18.57194709777832, 16.42671775817871, 16.37187957763672, 15.888115882873535, 12.611706733703613, 11.59769058227539, 12.047527313232422, 10.758723258972168, 10.29283618927002, 11.582205772399902, 7.649305820465088, 9.669326782226562, 7.5532402992248535, 6.87574577331543, 6.578831672668457, 6.492030143737793, 8.44167709350586, 8.041498184204102, 7.802469730377197, 7.802469730377197, 7.57916259765625, 7.487019062042236], [10.97531509399414, 9.752915382385254, 15.219649314880371, 8.780267715454102, 8.334403038024902, 8.719619750976562, 6.608164310455322, 10.46385383605957, 6.743483066558838, 10.61186695098877, 10.119975090026855, 6.103507995605469, 8.232502937316895, 6.278296947479248, 8.787063598632812, 7.073488712310791, 7.138687610626221, 8.475512504577637, 6.721588134765625, 5.874770641326904, 5.62320613861084, 5.62320613861084, 5.5631890296936035, 5.278914928436279]]};
    const records = pageData.records || [];

    function fmt(v) {
      return (v === null || v === undefined || Number.isNaN(v)) ? '-' : Number(v).toFixed(2);
    }

    function buildStats() {
      document.getElementById('statRuns').textContent = String(records.length);
      document.getElementById('statCkpts').textContent = String(new Set(records.map(r => r.checkpoint).filter(Boolean)).size);
      const peak = Math.max(...records.map(r => Number(r.top_layer_max_ma_ratio || 0)), 0);
      document.getElementById('statPeak').textContent = peak.toFixed(2);
      const counts = new Map();
      for (const r of records) {
        const k = r.top_layer_stage || 'n/a';
        counts.set(k, (counts.get(k) || 0) + 1);
      }
      let bestStage = '-';
      let bestCount = -1;
      for (const [k, v] of counts.entries()) {
        if (v > bestCount) { bestCount = v; bestStage = k; }
      }
      document.getElementById('statStage').textContent = bestStage;
    }

    function renderStageBar() {
      const runNames = records.map(r => r.run_name);
      const stages = ['stem_max', 'hires_max', 'body_max', 'skip_max', 'decoder_max', 'output_max'];
      const labels = {
        stem_max: 'stem',
        hires_max: 'hires',
        body_max: 'body',
        skip_max: 'skip',
        decoder_max: 'decoder',
        output_max: 'output'
      };
      const colors = ['#9aa5b1', '#d94841', '#f59f00', '#2b8a3e', '#1971c2', '#5f3dc4'];
      const traces = stages.map((stageKey, idx) => {
        return {
          type: 'bar',
          name: labels[stageKey],
          x: runNames,
          y: records.map(r => r[stageKey]),
          marker: { color: colors[idx] }
        };
      });
      Plotly.newPlot('stageBar', traces, {
        barmode: 'group',
        title: 'Stage Peak MA Ratio by Run',
        paper_bgcolor: '#ffffff',
        plot_bgcolor: '#ffffff',
        xaxis: { tickangle: -35 },
        yaxis: { title: 'max MA ratio' },
        margin: { l: 60, r: 20, t: 50, b: 140 }
      }, { responsive: true, displaylogo: false });
    }

    function renderStageScatter() {
      Plotly.newPlot('stageScatter', [{
        type: 'scatter',
        mode: 'markers+text',
        x: records.map(r => r.hires_max),
        y: records.map(r => r.decoder_max),
        text: records.map(r => r.run_name),
        textposition: 'top center',
        customdata: records.map(r => [r.top_layer_name, r.top_layer_max_ma_ratio, r.skip_max]),
        marker: {
          size: records.map(r => 10 + Number(r.top_layer_max_ma_ratio || 0)),
          color: records.map(r => r.skip_max),
          colorscale: 'YlOrRd',
          showscale: true,
          colorbar: { title: 'skip max' },
          line: { color: '#17324d', width: 1 }
        },
        hovertemplate: '<b>%{text}</b><br>hires=%{x:.2f}<br>decoder=%{y:.2f}<br>top=%{customdata[0]}<br>top ratio=%{customdata[1]:.2f}<br>skip=%{customdata[2]:.2f}<extra></extra>'
      }], {
        title: 'Hires vs Decoder MA',
        xaxis: { title: 'hires max MA ratio' },
        yaxis: { title: 'decoder max MA ratio' },
        paper_bgcolor: '#ffffff',
        plot_bgcolor: '#ffffff',
        margin: { l: 60, r: 20, t: 50, b: 60 }
      }, { responsive: true, displaylogo: false });
    }

    function renderLayerHeatmap() {
      Plotly.newPlot('layerHeatmap', [{
        type: 'heatmap',
        x: pageData.layer_names,
        y: records.map(r => r.run_name),
        z: pageData.layer_matrix,
        colorscale: 'YlOrRd',
        colorbar: { title: 'max MA ratio' },
        hovertemplate: 'run=%{y}<br>layer=%{x}<br>ratio=%{z:.2f}<extra></extra>'
      }], {
        title: 'Top Layer Heatmap',
        paper_bgcolor: '#ffffff',
        plot_bgcolor: '#ffffff',
        xaxis: { tickangle: -40 },
        margin: { l: 140, r: 20, t: 50, b: 180 }
      }, { responsive: true, displaylogo: false });
    }

    function renderTable() {
      const tbody = document.querySelector('#summaryTable tbody');
      tbody.innerHTML = records.map(r => `
        <tr>
          <td>${r.run_name}</td>
          <td class="muted">${r.checkpoint ? r.checkpoint.split(/[\\/]/).slice(-1)[0] : '-'}</td>
          <td>${r.top_layer_name || '-'}</td>
          <td>${r.top_layer_stage || '-'}</td>
          <td>${fmt(r.top_layer_max_ma_ratio)}</td>
          <td>${fmt(r.hires_max)}</td>
          <td>${fmt(r.body_max)}</td>
          <td>${fmt(r.skip_max)}</td>
          <td>${fmt(r.decoder_max)}</td>
        </tr>
      `).join('');
    }

    buildStats();
    renderStageBar();
    renderStageScatter();
    renderLayerHeatmap();
    renderTable();
  </script>
</body>
</html>
