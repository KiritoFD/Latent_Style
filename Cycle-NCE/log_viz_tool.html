<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Log Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --primary: #3b82f6;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            margin-bottom: 40px;
            text-align: left;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.025em;
        }
        .header p {
            color: var(--text-muted);
            margin-top: 8px;
        }

        /* Input Area */
        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 32px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            resize: vertical;
            box-sizing: border-box;
            background: #f1f5f9;
            transition: all 0.2s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        .btn-group {
            margin-top: 16px;
            display: flex;
            gap: 12px;
        }
        button {
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #f1f5f9;
            color: var(--text-muted);
        }
        .btn-secondary:hover {
            background: #e2e8f0;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
            display: none; /* Hidden by default */
        }
        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 4px;
            color: var(--text-main);
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
        }
        .chart-container {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .chart-title {
            font-weight: 700;
            color: var(--text-main);
            font-size: 1rem;
        }
        .current-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            background: #f8fafc;
            padding: 4px 10px;
            border-radius: 6px;
            color: var(--primary);
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Training Dynamics</h1>
            <p>Visualizing latent style training logs with robust pattern matching.</p>
        </header>

        <section class="glass-panel">
            <textarea id="logInput" placeholder="Paste your logs here..."></textarea>
            <div class="btn-group">
                <button class="btn-primary" onclick="processLogs()">Analyze Logs</button>
                <button class="btn-secondary" onclick="resetAll()">Clear</button>
            </div>
        </section>

        <div id="summaryArea" class="stats-grid"></div>

        <main class="charts-grid" id="chartsContainer"></main>
    </div>

    <script>
        const CONFIGS = {
            loss:  { selector: 'loss', title: 'Total Loss', color: '#ef4444', smooth: true },
            swd:   { selector: 'swd', title: 'SWD (Style Alignment)', color: '#10b981', smooth: true },
            color: { selector: 'color', title: 'Color Consistency', color: '#8b5cf6', smooth: true },
            idt:   { selector: 'idt', title: 'Identity Preservation T', color: '#f59e0b', smooth: true },
            idr:   { selector: 'idr', title: 'Identity Restoration R', color: '#06b6d4', smooth: true },
            lr:    { selector: 'lr', title: 'Learning Rate', color: '#3b82f6', stepped: true },
            comp:  { selector: 'comp', title: 'Computation Time', color: '#64748b', smooth: false }
        };

        function extractVal(line, key) {
            const regex = new RegExp(`${key}[:=\\s]+([\\d\\.e\\-]+)`, 'i');
            const match = line.match(regex);
            return match ? parseFloat(match[1]) : null;
        }

        function processLogs() {
            const raw = document.getElementById('logInput').value;
            const lines = raw.split('\n');
            const data = { epochs: [] };
            Object.keys(CONFIGS).forEach(k => data[k] = []);

            lines.forEach(line => {
                const epochMatch = line.match(/Epoch\s+(\d+)/i);
                if (!epochMatch) return;
                
                const e = parseInt(epochMatch[1]);
                data.epochs.push(e);
                Object.keys(CONFIGS).forEach(k => {
                    data[k].push(extractVal(line, CONFIGS[k].selector));
                });
            });

            if (data.epochs.length === 0) {
                alert("No valid log patterns found (Need 'Epoch X' and 'key=value')");
                return;
            }
            
            updateUI(data);
        }

        function updateUI(data) {
            const summary = document.getElementById('summaryArea');
            summary.style.display = 'grid';
            const lastIdx = data.epochs.length - 1;
            
            const stats = [
                { label: 'Total Epochs', val: data.epochs[lastIdx] },
                { label: 'Latest Loss', val: data.loss[lastIdx]?.toFixed(4) },
                { label: 'Best SWD', val: Math.min(...data.swd.filter(v => v !== null)).toFixed(4) },
                { label: 'Current LR', val: data.lr[lastIdx]?.toExponential(2) }
            ];
            
            summary.innerHTML = stats.map(s => `
                <div class="stat-card">
                    <div class="stat-label">${s.label}</div>
                    <div class="stat-value">${s.val}</div>
                </div>
            `).join('');

            const container = document.getElementById('chartsContainer');
            container.innerHTML = '';
            
            Object.entries(CONFIGS).forEach(([key, cfg]) => {
                const filteredData = data[key].filter(v => v !== null);
                if (filteredData.length === 0) return;

                const wrapper = document.createElement('div');
                wrapper.className = 'chart-container';
                const currentVal = data[key][lastIdx];
                const displayVal = key === 'lr' ? currentVal?.toExponential(2) : currentVal?.toFixed(4);

                wrapper.innerHTML = `
                    <div class="chart-header">
                        <div class="chart-title">${cfg.title}</div>
                        <div class="current-tag">${displayVal || 'N/A'}</div>
                    </div>
                    <canvas id="canvas-${key}"></canvas>
                `;
                container.appendChild(wrapper);

                const ctx = document.getElementById(`canvas-${key}`).getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.epochs,
                        datasets: [{
                            data: data[key],
                            borderColor: cfg.color,
                            backgroundColor: cfg.color + '10',
                            fill: true,
                            tension: cfg.smooth ? 0.3 : 0,
                            stepped: cfg.stepped || false,
                            pointRadius: data.epochs.length > 50 ? 0 : 3,
                            borderWidth: 2
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: { display: true, grid: { display: false } },
                            y: { beginAtZero: false, grid: { color: '#f1f5f9' } }
                        }
                    }
                });
            });
        }

        function resetAll() {
            document.getElementById('logInput').value = '';
            document.getElementById('summaryArea').style.display = 'none';
            document.getElementById('chartsContainer').innerHTML = '';
        }
    </script>
</body>
</html>
